<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">

        <link rel="stylesheet" href="./resources/ol.css">

        <style>

        /* Style untuk latar belakang modal */
.welcome-modal {
    display: flex;
    position: fixed;
    z-index: 9999; /* Pastikan di atas peta */
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
}

/* Style kotak konten modal */
.welcome-content {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.welcome-content h2 {
    margin-top: 0;
    color: #333;
}

.welcome-content button {
    background-color: #007bff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 15px;
}

.welcome-content button:hover {
    background-color: #0056b3;
}

        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
<div id="welcomeModal" class="welcome-modal">
    <div class="welcome-content">
        <h2>Selamat Datang!</h2>
        <p>Selamat datang di WebGIS D.I. Pidekso Kiri. Yuk mulai eksplorasi data irigasi dan area layanan kami 😊</p>
        <button onclick="closeModal()">Mulai Eksplorasi</button>
    </div>
</div>

        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/AreaLayanan_2.js"></script><script src="layers/Jalan_3.js"></script><script src="layers/SaluranEksisting_4.js"></script><script src="layers/SaluranIrigasi_5.js"></script><script src="layers/Sungai_6.js"></script><script src="layers/SaluranPrimerPideksoKiri_7.js"></script><script src="layers/Goronggorongsilang_8.js"></script><script src="layers/Goronggorong_9.js"></script><script src="layers/BangunanCorongan_10.js"></script><script src="layers/BangunanUkur_11.js"></script><script src="layers/BangunanTalang_12.js"></script><script src="layers/BangunanSadap_13.js"></script><script src="layers/TitikAcuan_14.js"></script>
        <script src="styles/AreaLayanan_2_style.js"></script><script src="styles/Jalan_3_style.js"></script><script src="styles/SaluranEksisting_4_style.js"></script><script src="styles/SaluranIrigasi_5_style.js"></script><script src="styles/Sungai_6_style.js"></script><script src="styles/SaluranPrimerPideksoKiri_7_style.js"></script><script src="styles/Goronggorongsilang_8_style.js"></script><script src="styles/Goronggorong_9_style.js"></script><script src="styles/BangunanCorongan_10_style.js"></script><script src="styles/BangunanUkur_11_style.js"></script><script src="styles/BangunanTalang_12_style.js"></script><script src="styles/BangunanSadap_13_style.js"></script><script src="styles/TitikAcuan_14_style.js"></script>

        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        
    
    <script>
    function closeModal() {
        document.getElementById('welcomeModal').style.display = 'none';
    }
    
    // Opsional: Menutup modal jika user klik di luar kotak putih
    window.onclick = function(event) {
        var modal = document.getElementById('welcomeModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
    </body>
</html>
